<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exam Timer | Bilgi University</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="counter">

        <header>
            <div class="logo-wrapper">
                <a href="https://www.bilgi.edu.tr" target="_blank" class="logo-link">
                    <img src="https://tbl.bilgi.edu.tr/brand-resources/logotypes/bilgi/svg/bilgi-logotype-en-light.svg"
                        alt="Bilgi University Logo" class="logo">
                </a>
            </div>
        </header>

        <div id="poda" class="input-wrapper-neon">
            <div class="white"></div>
            <div class="border"></div>
            <div class="darkBorderBg"></div>
            <div class="glow"></div>
            
            <div id="input-mask"></div>

            <div class="time-inputs">
                <div class="input-group">
                    <label for="hours">Hours</label>
                    <input type="number" id="hours" class="input" placeholder="0" min="0">
                </div>
                <div class="input-group">
                    <label for="minutes">Minutes</label>
                    <input type="number" id="minutes" class="input" placeholder="0" min="0">
                </div>
                <div class="input-group">
                    <label for="seconds">Seconds</label>
                    <input type="number" id="seconds" class="input" placeholder="0" min="0">
                </div>
            </div>
        </div>

        <div id="count">00:00:00</div>

        <button class="pushable" id="startPause">
            <span class="shadow"></span>
            <span class="edge"></span>
            <span class="front">Start Exam</span>
        </button>

        <button id="reset">Reset Timer</button>

    </section>

    <footer class="footer">
        <a href="https://github.com/guitareren" target="_blank" class="github-link">
            <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" width="20" height="20">
                <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.3.8-.6v-2.1c-3.2.7-3.9-1.5-3.9-1.5-.5-1.2-1.2-1.5-1.2-1.5-1-.7.1-.7.1-.7 1.1.1 1.7 1.1 1.7 1.1 1 .1 1.6-.7 1.8-1.1.1-.7.4-1.1.7-1.3-2.6-.3-5.3-1.3-5.3-5.8 0-1.3.5-2.4 1.2-3.3-.1-.3-.5-1.6.1-3.3 0 0 1-.3 3.4 1.2a11.7 11.7 0 0 1 6.2 0c2.4-1.5 3.4-1.2 3.4-1.2.6 1.7.2 3 .1 3.3.8.9 1.2 2 1.2 3.3 0 4.5-2.7 5.5-5.3 5.8.4.3.8 1 .8 2.1v3.1c0 .3.2.7.8.6 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.65 18.35.5 12 .5z" />
            </svg>
            <span>eren<strong>avunc</strong></span>
        </a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="scripts.js"></script>
</body>

</html>
