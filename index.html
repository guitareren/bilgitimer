<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Exam Timer</title>
    <!-- Google Fonts: Roboto Mono -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> 

</head>
<header>
    <a href="https://www.bilgi.edu.tr" class="logo-link">
        <img src="https://tbl.bilgi.edu.tr/brand-resources/logotypes/bilgi/svg/bilgi-logotype-en-light.svg"
            alt="Bilgi University Logo" class="logo">
    </a>
</header>

<body>
    <section class="counter">
        <!-- Saat, Dakika, Saniye inputları -->
        <div id="poda" class="input-wrapper-neon">
            <div class="white"></div>
            <div class="border"></div>
            <div class="darkBorderBg"></div>
            <div class="glow"></div>

            <div class="time-inputs">
                <div>
                    <label for="hours">Hours</label>
                    <input type="number" id="hours" class="input" placeholder="0" min="0">
                </div>
                <div>
                    <label for="minutes">Minutes</label>
                    <input type="number" id="minutes" class="input" placeholder="0" min="0">
                </div>
                <div>
                    <label for="seconds">Seconds</label>
                    <input type="number" id="seconds" class="input" placeholder="0" min="0">
                </div>
            </div>

            <div id="input-mask"></div>
            <div id="pink-mask"></div>
            <div id="filter-icon">⏱</div>
        </div>

        <!-- Timer display -->
        <div id="count">00:00:00</div>

        <!-- Start/Pause button -->
        <button class="pushable" id="startPause">
            <span class="shadow"></span>
            <span class="edge"></span>
            <span class="front">Start Exam</span>
        </button>

        <!-- Reset button -->
        <button id="reset">Reset</button>
    </section>

    <script>
        let remaining = 0;
        let interval = null;
        let isRunning = false;

        const countEl = document.getElementById("count");
        const startPauseBtn = document.getElementById("startPause");
        const resetBtn = document.getElementById("reset");
        const hoursInput = document.getElementById("hours");
        const minutesInput = document.getElementById("minutes");
        const secondsInput = document.getElementById("seconds");

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600).toString().padStart(2, "0");
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, "0");
            const s = (seconds % 60).toString().padStart(2, "0");
            return `${h}:${m}:${s}`;
        }

        function updateDisplay() {
            countEl.textContent = formatTime(remaining);
        }

        function toggleTimer() {
            if (!isRunning) {
                if (remaining <= 0) {
                    const h = parseInt(hoursInput.value, 10) || 0;
                    const m = parseInt(minutesInput.value, 10) || 0;
                    const s = parseInt(secondsInput.value, 10) || 0;
                    remaining = h * 3600 + m * 60 + s;
                    if (remaining <= 0) {
                        alert("Please enter a valid exam duration.");
                        return;
                    }
                    updateDisplay();
                }
                interval = setInterval(() => {
                    if (remaining > 0) {
                        remaining--;
                        updateDisplay();
                    } else {
                        clearInterval(interval);
                        interval = null;
                        isRunning = false;
                        startPauseBtn.querySelector(".front").textContent = "Start Exam";
                        countEl.textContent = "TIME UP!";
                    }
                }, 1000);
                isRunning = true;
                startPauseBtn.querySelector(".front").textContent = "Pause Exam";
            } else {
                clearInterval(interval);
                interval = null;
                isRunning = false;
                startPauseBtn.querySelector(".front").textContent = "Resume Exam";
            }
        }

        function resetTimer() {
            clearInterval(interval);
            interval = null;
            isRunning = false;
            remaining = 0;
            countEl.textContent = "00:00:00";
            startPauseBtn.querySelector(".front").textContent = "Start Exam";
        }

        startPauseBtn.addEventListener("click", toggleTimer);
        resetBtn.addEventListener("click", resetTimer);

        updateDisplay();
    </script>
</body>
