<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Timer</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Roboto+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="counter">

        <header class="logo-wrapper">
            <a href="https://www.bilgi.edu.tr" target="_blank" class="logo-link">
                <img src="https://tbl.bilgi.edu.tr/brand-resources/logotypes/bilgi/svg/bilgi-logotype-en-light.svg"
                    alt="Bilgi University Logo" class="logo">
            </a>
        </header>

        <div id="poda" class="input-wrapper-neon">
            <div class="white"></div>
            <div class="border"></div>
            <div class="darkBorderBg"></div>
            <div class="glow"></div>

            <div class="time-inputs">
                <div>
                    <label for="hours">Hours</label>
                    <input type="number" id="hours" class="input" placeholder="0" min="0">
                </div>
                <div>
                    <label for="minutes">Minutes</label>
                    <input type="number" id="minutes" class="input" placeholder="0" min="0">
                </div>
                <div>
                    <label for="seconds">Seconds</label>
                    <input type="number" id="seconds" class="input" placeholder="0" min="0">
                </div>
            </div>

            <div id="input-mask"></div>
            <div id="pink-mask"></div>
            <div id="filter-icon">⏱</div>
        </div>

        <div id="count">00:00:00</div>

        <button class="pushable" id="startPause">
            <span class="shadow"></span>
            <span class="edge"></span>
            <span class="front">Start Exam</span>
        </button>

        <button id="reset">Reset Timer</button>

    </section>

    <footer class="footer">
        <a href="https://github.com/guitareren" target="_blank" class="github-link">
            <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M12 .5C5.65.5.5 5.65.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.3.8-.6v-2.1c-3.2.7-3.9-1.5-3.9-1.5-.5-1.2-1.2-1.5-1.2-1.5-1-.7.1-.7.1-.7 1.1.1 1.7 1.1 1.7 1.1 1 .1 1.6-.7 1.8-1.1.1-.7.4-1.1.7-1.3-2.6-.3-5.3-1.3-5.3-5.8 0-1.3.5-2.4 1.2-3.3-.1-.3-.5-1.6.1-3.3 0 0 1-.3 3.4 1.2a11.7 11.7 0 0 1 6.2 0c2.4-1.5 3.4-1.2 3.4-1.2.6 1.7.2 3 .1 3.3.8.9 1.2 2 1.2 3.3 0 4.5-2.7 5.5-5.3 5.8.4.3.8 1 .8 2.1v3.1c0 .3.2.7.8.6 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.65 18.35.5 12 .5z" />
            </svg>
            <span>eren<strong>avunc</strong></span>
        </a>
    </footer>
    <script>
        let remaining = 0;
        let interval = null;
        let isRunning = false;

        const countEl = document.getElementById("count");
        const startPauseBtn = document.getElementById("startPause");
        const resetBtn = document.getElementById("reset");
        const hoursInput = document.getElementById("hours");
        const minutesInput = document.getElementById("minutes");
        const secondsInput = document.getElementById("seconds");

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600).toString().padStart(2, "0");
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, "0");
            const s = (seconds % 60).toString().padStart(2, "0");
            return `${h}:${m}:${s}`;
        }

        function updateDisplay() {
            countEl.textContent = formatTime(remaining);
        }

        function toggleTimer() {
            if (!isRunning) {
                if (remaining <= 0) {
                    const h = parseInt(hoursInput.value, 10) || 0;
                    const m = parseInt(minutesInput.value, 10) || 0;
                    const s = parseInt(secondsInput.value, 10) || 0;
                    remaining = h * 3600 + m * 60 + s;
                    if (remaining <= 0) {
                        alert("Please enter a valid exam duration.");
                        return;
                    }
                    updateDisplay();
                }
                interval = setInterval(() => {
                    if (remaining > 0) {
                        remaining--;
                        updateDisplay();
                    } else {
                        clearInterval(interval);
                        interval = null;
                        isRunning = false;
                        startPauseBtn.querySelector(".front").textContent = "Start Exam";
                        countEl.textContent = "TIME UP!";
                    }
                }, 1000);
                isRunning = true;
                startPauseBtn.querySelector(".front").textContent = "Pause Exam";
            } else {
                clearInterval(interval);
                interval = null;
                isRunning = false;
                startPauseBtn.querySelector(".front").textContent = "Resume Exam";
            }
        }

        function resetTimer() {
            // 1. Önce çalışan bir sayaç varsa durdur
            clearInterval(interval);
            interval = null;
            isRunning = false;

            // 2. Inputlardaki değerleri oku (Hata payını önlemek için || 0 ekliyoruz)
            const hours = parseInt(document.getElementById('hours').value) || 0;
            const minutes = parseInt(document.getElementById('minutes').value) || 0;
            const seconds = parseInt(document.getElementById('seconds').value) || 0;

            // 3. Kalan süreyi (remaining) bu değerlere göre güncelle
            remaining = (hours * 3600) + (minutes * 60) + seconds;

            // 4. Sayacı ekranda formatlı göster (Örn: 01:30:00)
            displayTime(remaining);

            // 5. Buton metnini başa döndür
            startPauseBtn.querySelector(".front").textContent = "Start Exam";
        }

        
        function displayTime(totalSeconds) {
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;

            countEl.textContent = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        startPauseBtn.addEventListener("click", toggleTimer);
        resetBtn.addEventListener("click", resetTimer);

        updateDisplay();
    </script>
</body>

</html>
